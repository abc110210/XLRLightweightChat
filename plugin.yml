name: XLRLightweightChat
version: 1.0.0
main: xlingran.Shan
api-version: 1.21.1
author: Shan
description: 一款多功能聊天插件

commands:
  xlrchat:
    description: 重载插件配置
    usage: /<command> reload
    permission: xlr.admin.reload

permissions:
  xlr.admin.reload:
    description: 重载插件配置
    default: op
  xlr.chat.*:
    description: 所有聊天格式权限（通配符）
    default: false
