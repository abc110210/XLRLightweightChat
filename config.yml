
# 优先级从上往下开始检查，权限节点是 xlr.chat.名称，玩家默认拥有 xlr.chat.default 权限
# 聊天格式顺序 [前缀] [称号] [玩家名称] : [16进制颜色] [聊天内容]
# 可多个聊天格式，格式名称可自定义
Chat:
  op: "%title% %color1%%player%: %asd445%chat%" # 优先检查权限
  default: "%title% &a%player%: %color3%%chat%" # 后续检查权限

# 16进制渐变颜色变量配置，可以创建多个
# 可以在上面使用变量是 %color1% %color2%
Variable:
  color1: "#e4afcb-#7edbdc"
  color2: "#e4afcb-#eef1f5"
  color3: "#00c6fb-#005bea"
  color4: "#d4fc79-#96e6a1-#84fab0"
  asd445: "#30cfd0-#330867-#a8edea-#fed6e3"

# 最多拥有 56 个称号，最少 1 个
# 优先级从上往下开始检查，权限节点是 xlr.playertitle.ID
# ID只能数字 1 ~ 56 ，不能字母
# 称号支持 %olor1% %color2% %color3% 16进制颜色变量
PlayerTitle:
  1: # 优先检测权限
    name: "%color2%[管理员]" # 称号名称
    Lore:
      - "&a管理员专属称号" # 称号描述可多条，鼠标挪动到称号时显示
  2: # 第二个检测权限
    name: "%color3%[SVIP]"
    Lore:
      - "%color4%高级贵族称号"
      - "&cVip玩家专属称号"
  3:
    name: "&b[居民]"
    Lore:
      - "&a普通玩家称号"
  # 4-56: 可以继续添加更多称号...

# 鼠标悬浮事件
Required:
  # 代表 %player% 鼠标挪到到这个变量时的悬浮显示
  player:
    # 悬浮显示字体
    - ""
    - "&a> &b点我私聊"
    # 预装填到聊天栏指令
    - Command: msg %player%
  # 代表 %chat%
  chat:
    - ""
    - "&a> &b点击发送传送"
    - "&a> &b需要该玩家同意!"
    # 直接执行指令
    - RunCommand: tpa %player%

# 输入命令，命令输出提示
Command:
  # 输入/xlrchat reload 后提示
  reload:
    - "&7配置已重新加载"
    - "&7已加载 &6%chat_format% &7个聊天格式"
    - "&7已加载 &6%color_config% &7个变量颜色配置"
  help:
    - "&6===== [XLRightweightChat] ====="
    - "&7- /xlrchat cp &6打开称号仓库"
    - "&7- /xlrchat reload &6重载该插件"

# 消息提示
Message:
  # 没有权限时输出提示
  NoPermission: "&c你没有权限执行此命令"
  # 输入未知子命令时输出提示
  UnknownSubCmd: "&c未知的子命令"
  # 命令不是由玩家执行时
  NoPlayer: "&c此命令只能由玩家执行!"

# 控制台错误警告
Cmd:
  playerDataNo: "无法保存玩家数据!"
  playerUUIDNo: "无效的玩家UUID: %uuid%"
